    breaking_changes: []

  - track: observer-eastmesh
    version: "2026.6.2"
    tag: "observer-eastmesh-v2026.6.2"
    date: "2026-06-07"
    previous_version: "2026.6.1"
    summary: "Improves Observer boot reliability, T-Beam S3 Supreme telemetry, Wi-Fi/OTA persistence, and web-panel archive maintenance."
    changes:
      - type: fixed
        area: board
        text: "Fixed LilyGo T-Beam S3 Supreme BME280 detection and live telemetry by using the board-detected address, stop-based I2C reads, and board-specific I2C bus recovery before samples."
      - type: fixed
        area: web
        text: "Changed live `/stats` sensor values to use the main-loop sensor snapshot instead of reading I2C sensors from the web request handler."
      - type: fixed
        area: wifi
        text: "Improved boot-time Wi-Fi startup by starting Wi-Fi earlier on T-Beam S3 Supreme, remembering the last connected AP channel, and falling back to full scan if that channel is stale."
      - type: fixed
        area: wifi
        text: "Added NVS-backed Wi-Fi preference recovery so SSID and password survive OTA updates even if the filesystem preference file is lost."
      - type: fixed
        area: wifi
        text: "Hardened Wi-Fi retry handling so scan-mode connects are not interrupted early and failed attempts reset the ESP32 station state before retrying."
      - type: fixed
        area: cli
        text: "Fixed `set wifi.powersaving none` returning an error when Wi-Fi power saving was already disabled."
      - type: fixed
        area: archive
        text: "Bounded archive neighbour restore and history reads so large SD-card archive files no longer slow boot unnecessarily."
      - type: added
        area: web
        text: "Added a web-panel and CLI SD purge action for clearing archive contents from supported SD-card targets."
      - type: fixed
        area: web
        text: "Hardened OTA startup by binding before reporting success and falling back to alternate ports when port 80 is still being released."
    breaking_changes: []

  - track: observer-eastmesh
    version: "2026.6.3"
    tag: "observer-eastmesh-v2026.6.3"
    date: "2026-06-09"
    previous_version: "2026.6.2"
    summary: "Adds secure WebSocket transport support for custom MQTT brokers from the Observer web panel and CLI."
    changes:
      - type: added
        area: mqtt
        text: "Added TCP/WSS transport selection for custom MQTT brokers while keeping custom broker authentication to username and password only."
      - type: fixed
        area: mqtt
        text: "Verified custom MQTT WSS connections with the ESP-IDF x509 root CA bundle and the fixed `/mqtt` WebSocket path."
      - type: fixed
        area: mqtt
        text: "Configured custom MQTT WSS using a full `wss://host:port/mqtt` URI so ESP-MQTT handles the WebSocket connection consistently."
      - type: changed
        area: cli
        text: "Updated `get mqtt.status` to show the custom MQTT transport and state, for example `custom:wss:up`."
      - type: docs
        area: docs
        text: "Documented custom MQTT TCP/WSS configuration in the web panel and custom CLI guides."
    breaking_changes: []

  - track: observer-eastmesh
    version: "2026.6.4"
    tag: "observer-eastmesh-v2026.6.4"
    date: "2026-06-23"
    previous_version: "2026.6.3"
    summary: "Replaces the retired LetsMesh brokers with the MeshMapper broker and reworks broker selection into Primary and Secondary slots."
    changes:
      - type: added
        area: mqtt
        text: "Added the `meshmapper` curated broker (`wss://mqtt.meshmapper.net:443/mqtt`) using WSS, verified TLS, and MeshCore JWT authentication with the broker host as the token audience."
      - type: added
        area: cli
        text: "Added `get mqtt.meshmapper` and `set mqtt.meshmapper on|off` to toggle the MeshMapper broker."
      - type: changed
        area: mqtt
        text: "Retired the unmaintained LetsMesh EU/US brokers: they remain selectable but are marked retired, and saved selections are cleared once on upgrade so dead brokers stop retrying."
      - type: changed
        area: web
        text: "Replaced the EastMesh and LetsMesh sliders and the custom MQTT toggle with Primary and Secondary broker dropdowns that enforce the two-broker maximum and reveal custom host, username, and password fields when Custom is selected."
      - type: changed
        area: cli
        text: "Shortened `get mqtt.status` to report the two active broker slots as `p:<broker>:<state>` and `s:<broker>:<state>` so the reply stays within the LoRa text limit."
      - type: docs
        area: docs
        text: "Updated the README, web panel, and custom CLI guides for MeshMapper and the Primary/Secondary broker layout."
    breaking_changes:
      - "`get mqtt.status` output changed from per-broker fields to `p:`/`s:` broker slots; anything parsing the previous format must be updated."
      - "Saved LetsMesh EU/US broker selections are cleared once on upgrade; re-enable a broker such as MeshMapper if a second uplink is required."

