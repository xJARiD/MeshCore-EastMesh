; ─────────────────────────────────────────────────────────────────
;  variants/elecrow_crt01262m/platformio.ini
;  MeshCore board variant for Elecrow ESP32 LoRa Gateway CRT01262M
;
;  Hardware:
;    MCU   : ESP32-WROOM-32UE (240 MHz, 4MB flash)
;    Radio : RA-01H (SX1276) on VSPI (SCK=33, MISO=35, MOSI=32)
;    LCD   : ST7735S 128×160 on same VSPI bus
;    LED   : GPIO5 (blue, active HIGH)
; ─────────────────────────────────────────────────────────────────

[elecrow_crt01262m_base]
extends = esp32_base
board = esp32dev
board_build.flash_mode = dio

extra_scripts =
    merge-bin.py

lib_deps =
    ${esp32_base.lib_deps}
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.14.0
    densaugeo/base64 @ ~1.4.0

build_flags =
    ${esp32_base.build_flags}

    ; ── Include path: target.h lives in the variant directory ────
    -I variants/elecrow_crt01262m

    ; ── Region / RF defaults (AU915 channel 8) ───────────────────
    -D LORA_FREQ=916.8
    -D LORA_BW=125.0
    -D LORA_SF=7
    -D LORA_CR=5
    -D LORA_TX_POWER=17

    ; ── Radio driver classes ─────────────────────────────────────
    -D RADIO_CLASS=CustomSX1276
    -D WRAPPER_CLASS=CustomSX1276Wrapper

    ; ── SPI + LoRa pins ──────────────────────────────────────────
    -D P_LORA_SCLK=33
    -D P_LORA_MISO=35
    -D P_LORA_MOSI=32
    -D P_LORA_NSS=14
    -D P_LORA_RESET=12
    -D P_LORA_DIO_0=13
    -D P_LORA_DIO_1=-1
    -D P_LORA_DIO_2=-1
    -D P_LORA_TXEN=-1
    -D P_LORA_RXEN=-1
    -D P_LORA_BUSY=-1

    ; ── ST7735S display pins ─────────────────────────────────────
    -D USE_ST7735
    -D DISPLAY_CLASS=ST7735Display
    -D USE_VSPI=1
    -D PIN_TFT_CS=2
    -D PIN_TFT_DC=4
    -D PIN_TFT_RST=-1
    -D PIN_TFT_SDA=32
    -D PIN_TFT_SCL=33
    -D PIN_TFT_LEDA_CTL=16
    ; ST7735S has 132×162 RAM but only 128×160 is visible; offsets skip the
    ; uninitialised rows/columns.  Values confirmed empirically for this panel.
    -D ST7735_COL_OFFSET=2
    -D ST7735_ROW_OFFSET=2
    -D DISPLAY_ROTATION=0

    ; ── LED + button ─────────────────────────────────────────────
    -D P_LORA_TX_LED=5
    -D PIN_USER_BTN=0

build_src_filter =
    ${esp32_base.build_src_filter}
    +<helpers/ui/ST7735Display.cpp>
    +<helpers/esp32/*.cpp>
    +<helpers/sensors>
    +<../variants/elecrow_crt01262m/target.cpp>

; ── Simple repeater ──────────────────────────────────────────────
[env:elecrow_crt01262m_repeater]
extends = elecrow_crt01262m_base
build_flags =
    ${elecrow_crt01262m_base.build_flags}
    -D MAX_CONTACTS=100
    -D MAX_GROUP_CHANNELS=8
    -D ENABLE_ADVERT_ON_BOOT=1
build_src_filter =
    ${elecrow_crt01262m_base.build_src_filter}
    +<../examples/simple_repeater>

; ── Repeater with WiFi web panel ─────────────────────────────────
; WiFi credentials and admin password are set at runtime via serial CLI:
;   set wifi.ssid <name>
;   set wifi.pwd  <password>
;   set web on
; Then browse to http://<ip>
[env:elecrow_crt01262m_repeater_wifi]
extends = elecrow_crt01262m_base
board_build.partitions = min_spiffs.csv
lib_deps =
    ${elecrow_crt01262m_base.lib_deps}
    ${esp32_ota.lib_deps}
build_flags =
    ${elecrow_crt01262m_base.build_flags}
    -D MAX_CONTACTS=200
    -D MAX_GROUP_CHANNELS=16
    -D ENABLE_ADVERT_ON_BOOT=1
    -D WITH_MQTT_UPLINK=1
    -D ADVERT_NAME='"Elecrow Repeater"'
    -D ADVERT_LAT=0.0
    -D ADVERT_LON=0.0
    -D ADMIN_PASSWORD='"password"'
    -D MAX_NEIGHBOURS=50
    -D MQTT_DEFAULT_IATA='"UNSET"'
build_src_filter =
    ${elecrow_crt01262m_base.build_src_filter}
    +<../examples/simple_repeater>
    +<helpers/mqtt/*.cpp>
    +<helpers/web/*.cpp>

; ── Repeater with WiFi web panel + ESP-NOW bridge ────────────────
[env:elecrow_crt01262m_repeater_wifi_bridge]
extends = env:elecrow_crt01262m_repeater_wifi
build_flags =
    ${env:elecrow_crt01262m_repeater_wifi.build_flags}
    -D WITH_ESPNOW_BRIDGE=1
build_src_filter =
    ${env:elecrow_crt01262m_repeater_wifi.build_src_filter}
    +<helpers/bridges/ESPNowBridge.cpp>

; ── WiFi companion radio ─────────────────────────────────────────
; Set WIFI_SSID and WIFI_PWD environment variables before building.
[env:elecrow_crt01262m_companion_radio_wifi]
extends = elecrow_crt01262m_base
lib_deps =
    ${elecrow_crt01262m_base.lib_deps}
    ${esp32_ota.lib_deps}
build_flags =
    ${elecrow_crt01262m_base.build_flags}
    -D MAX_CONTACTS=200
    -D MAX_GROUP_CHANNELS=16
    -D WIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PWD=\"${sysenv.WIFI_PWD}\"
build_src_filter =
    ${elecrow_crt01262m_base.build_src_filter}
    +<../examples/companion_radio>
