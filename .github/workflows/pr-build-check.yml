name: PR Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - "variants/**"
      - "platformio.ini"
      - ".github/workflows/pr-build-check.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OFFICIAL_MESHCORE_VERSION: ${{ vars.OFFICIAL_MESHCORE_VERSION }}
      PLATFORMIO_BUILD_FLAGS: -UMQTT_DEBUG
    strategy:
      fail-fast: false
      matrix:
        environment:
          # ESP32-S3 / core EastMesh targets
          - Heltec_v3_companion_radio_wifi
          - Heltec_v3_repeater_mqtt
          - heltec_v4_companion_radio_wifi
          - heltec_v4_repeater_mqtt
          - T_Beam_S3_Supreme_SX1262_companion_radio_wifi
          - T_Beam_S3_Supreme_SX1262_repeater_mqtt
          # ESP32-C3
          - Xiao_C3_companion_radio_wifi
          - Xiao_C3_repeater_mqtt
          # ESP32-C6
          - LilyGo_Tlora_C6_repeater_mqtt_

    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}
